x-server-build: &server-build
  context: ../..
  dockerfile: infra/docker/Dockerfile.server
  args:
    RUST_VERSION: ${ZIPSHIP_RUST_VERSION:-1.97.0}

services:
  migrate:
    build: *server-build

  edge:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.edge
      args:
        BUN_VERSION: ${ZIPSHIP_BUN_VERSION:-1.3.14}
        CADDY_VERSION: ${ZIPSHIP_CADDY_VERSION:-2.11.4}
    command:
      - caddy
      - run
      - --config
      - /etc/caddy/Caddyfile.smoke
      - --adapter
      - caddyfile
