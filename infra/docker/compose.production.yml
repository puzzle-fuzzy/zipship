name: zipship-production

x-server-image: &server-image
  image: ${ZIPSHIP_SERVER_IMAGE:-zipship/server:local}

x-server-build: &server-build
  context: ../..
  dockerfile: infra/docker/Dockerfile.server
  args:
    RUST_VERSION: ${ZIPSHIP_RUST_VERSION:-1.97.0}

x-server-environment: &server-environment
  ZIPSHIP_ENV: production
  ZIPSHIP_HTTP_BIND: 0.0.0.0:5006
  ZIPSHIP_ACCESS_BIND: 0.0.0.0:5007
  ZIPSHIP_CONTROL_ALLOWED_ORIGINS: ${ZIPSHIP_CONSOLE_ORIGIN:?Set ZIPSHIP_CONSOLE_ORIGIN}
  ZIPSHIP_TRUSTED_PROXY_NETWORKS: ${ZIPSHIP_BACKEND_SUBNET:-172.30.0.0/24}
  ZIPSHIP_CONSOLE_PUBLIC_URL: ${ZIPSHIP_CONSOLE_ORIGIN:?Set ZIPSHIP_CONSOLE_ORIGIN}/
  ZIPSHIP_DATABASE_URL: ${ZIPSHIP_DATABASE_URL:?Set ZIPSHIP_DATABASE_URL}
  ZIPSHIP_DATABASE_MAX_CONNECTIONS: ${ZIPSHIP_DATABASE_MAX_CONNECTIONS:-20}
  ZIPSHIP_STORAGE_ROOT: /var/lib/zipship
  ZIPSHIP_LOG: ${ZIPSHIP_LOG:-info,sqlx=warn}
  ZIPSHIP_PASSWORD_RECOVERY_ACTIVE_KEY_ID: ${ZIPSHIP_PASSWORD_RECOVERY_ACTIVE_KEY_ID:?Set ZIPSHIP_PASSWORD_RECOVERY_ACTIVE_KEY_ID}
  ZIPSHIP_PASSWORD_RECOVERY_KEYS: ${ZIPSHIP_PASSWORD_RECOVERY_KEYS:?Set ZIPSHIP_PASSWORD_RECOVERY_KEYS}
  ZIPSHIP_SMTP_URL: ${ZIPSHIP_SMTP_URL:?Set ZIPSHIP_SMTP_URL}
  ZIPSHIP_SMTP_FROM: ${ZIPSHIP_SMTP_FROM:?Set ZIPSHIP_SMTP_FROM}
  ZIPSHIP_WORKER_POLL_MS: ${ZIPSHIP_WORKER_POLL_MS:-500}
  ZIPSHIP_WORKER_LEASE_SECS: ${ZIPSHIP_WORKER_LEASE_SECS:-60}
  ZIPSHIP_WORKER_SWEEP_SECS: ${ZIPSHIP_WORKER_SWEEP_SECS:-30}
  ZIPSHIP_UPLOAD_MAX_BYTES: ${ZIPSHIP_UPLOAD_MAX_BYTES:-524288000}
  ZIPSHIP_UPLOAD_TTL_SECS: ${ZIPSHIP_UPLOAD_TTL_SECS:-86400}
  ZIPSHIP_UPLOAD_RECEIVE_LEASE_SECS: ${ZIPSHIP_UPLOAD_RECEIVE_LEASE_SECS:-3600}
  ZIPSHIP_ARTIFACT_MAX_ENTRIES: ${ZIPSHIP_ARTIFACT_MAX_ENTRIES:-25000}
  ZIPSHIP_ARTIFACT_MAX_FILE_BYTES: ${ZIPSHIP_ARTIFACT_MAX_FILE_BYTES:-134217728}
  ZIPSHIP_ARTIFACT_MAX_EXPANDED_BYTES: ${ZIPSHIP_ARTIFACT_MAX_EXPANDED_BYTES:-2147483648}
  ZIPSHIP_ARTIFACT_MAX_PATH_DEPTH: ${ZIPSHIP_ARTIFACT_MAX_PATH_DEPTH:-32}
  ZIPSHIP_ARTIFACT_MAX_COMPRESSION_RATIO: ${ZIPSHIP_ARTIFACT_MAX_COMPRESSION_RATIO:-200}
  ZIPSHIP_ARTIFACT_COMPRESSION_RATIO_GRACE_BYTES: ${ZIPSHIP_ARTIFACT_COMPRESSION_RATIO_GRACE_BYTES:-1048576}

x-app-hardening: &app-hardening
  read_only: true
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  tmpfs:
    - /tmp:size=64m,mode=1777

services:
  postgres:
    image: ${ZIPSHIP_POSTGRES_IMAGE:-postgres:17.6-bookworm}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${ZIPSHIP_POSTGRES_USER:?Set ZIPSHIP_POSTGRES_USER}
      POSTGRES_PASSWORD: ${ZIPSHIP_POSTGRES_PASSWORD:?Set ZIPSHIP_POSTGRES_PASSWORD}
      POSTGRES_DB: ${ZIPSHIP_POSTGRES_DB:?Set ZIPSHIP_POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$$POSTGRES_USER\" -d \"$$POSTGRES_DB\""]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - backend
    stop_grace_period: 60s

  migrate:
    <<: [*server-image, *app-hardening]
    build: *server-build
    command: ["zipshipd", "migrate"]
    restart: "no"
    environment: *server-environment
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - backend

  zipshipd:
    <<: [*server-image, *app-hardening]
    command: ["zipshipd", "serve"]
    restart: unless-stopped
    environment: *server-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "--show-error", "http://127.0.0.1:5006/_health/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - artifacts:/var/lib/zipship
    networks:
      - backend
    stop_grace_period: 30s
    pids_limit: 256

  worker:
    <<: [*server-image, *app-hardening]
    command: ["zipship-worker"]
    restart: unless-stopped
    environment: *server-environment
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "grep -aq 'zipship-worker' /proc/1/cmdline"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 10s
    volumes:
      - artifacts:/var/lib/zipship
    networks:
      - backend
      - egress
    stop_grace_period: 60s
    pids_limit: 256

  edge:
    image: ${ZIPSHIP_EDGE_IMAGE:-zipship/edge:local}
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.edge
      args:
        BUN_VERSION: ${ZIPSHIP_BUN_VERSION:-1.3.14}
        CADDY_VERSION: ${ZIPSHIP_CADDY_VERSION:-2.11.4}
        VITE_ZIPSHIP_API_BASE_URL: ${ZIPSHIP_API_ORIGIN:?Set ZIPSHIP_API_ORIGIN}
        VITE_ZIPSHIP_ACCESS_BASE_URL: ${ZIPSHIP_ACCESS_ORIGIN:?Set ZIPSHIP_ACCESS_ORIGIN}
    restart: unless-stopped
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:size=32m,mode=1777
    environment:
      ZIPSHIP_ACME_EMAIL: ${ZIPSHIP_ACME_EMAIL:?Set ZIPSHIP_ACME_EMAIL}
      ZIPSHIP_CONSOLE_HOST: ${ZIPSHIP_CONSOLE_HOST:?Set ZIPSHIP_CONSOLE_HOST}
      ZIPSHIP_API_HOST: ${ZIPSHIP_API_HOST:?Set ZIPSHIP_API_HOST}
      ZIPSHIP_ACCESS_HOST: ${ZIPSHIP_ACCESS_HOST:?Set ZIPSHIP_ACCESS_HOST}
      ZIPSHIP_API_ORIGIN: ${ZIPSHIP_API_ORIGIN:?Set ZIPSHIP_API_ORIGIN}
      ZIPSHIP_ACCESS_ORIGIN: ${ZIPSHIP_ACCESS_ORIGIN:?Set ZIPSHIP_ACCESS_ORIGIN}
    depends_on:
      zipshipd:
        condition: service_healthy
      worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--output-document=-", "http://127.0.0.1:2019/healthz"]
      interval: 10s
      timeout: 3s
      retries: 6
      start_period: 5s
    ports:
      - "${ZIPSHIP_HTTP_PORT:-80}:8080/tcp"
      - "${ZIPSHIP_HTTPS_PORT:-443}:8443/tcp"
      - "${ZIPSHIP_HTTPS_PORT:-443}:8443/udp"
    volumes:
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - backend
      - egress
    stop_grace_period: 30s
    pids_limit: 128

volumes:
  artifacts:
  caddy-config:
  caddy-data:
  postgres-data:

networks:
  backend:
    internal: true
    ipam:
      config:
        - subnet: ${ZIPSHIP_BACKEND_SUBNET:-172.30.0.0/24}
  egress:
