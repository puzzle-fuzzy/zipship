# ZipShip local infrastructure stack.
# Production images and orchestration are intentionally handled separately;
# this file contains only stateful dependencies used by Rust development and tests.
name: zipship

services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: zipship
      POSTGRES_PASSWORD: zipship
      POSTGRES_DB: zipship
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zipship"]
      interval: 2s
      timeout: 2s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Local SMTP capture for password recovery development and integration tests.
  mailpit:
    image: axllent/mailpit:v1.30.3
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  pgdata:
