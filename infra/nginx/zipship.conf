worker_processes  1;
pid ${ZIPSHIP_NGINX_PID};

events {
  worker_connections  1024;
}

http {
  default_type  application/octet-stream;
  sendfile      on;

  # ── Compression ──────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

  # ── Rate limiting on the control-plane API (per-IP) ───────────────────────
  limit_req_zone $binary_remote_addr zone=zipship_api:10m rate=10r/s;
  limit_req_status 429;

  server {
    listen ${ZIPSHIP_LISTEN_PORT};
    server_name _;
    client_max_body_size ${ZIPSHIP_MAX_BODY_SIZE};

    # ── Baseline security headers ──────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # In production, terminate TLS upstream (Caddy/Cloudflare/LE) and add HSTS:
    #   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location ^~ /_api/ {
      limit_req zone=zipship_api burst=20 nodelay;
      proxy_pass ${ZIPSHIP_API_UPSTREAM};
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /_sites/ {
      proxy_pass ${ZIPSHIP_API_UPSTREAM};
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /_console/ {
      alias ${ZIPSHIP_CONSOLE_ROOT}/;
      try_files $uri $uri/ /index.html;
      add_header Cache-Control "no-cache";
    }

    location ~ ^/([a-z0-9][a-z0-9_-]*)/([a-f0-9]{12})$ {
      return 308 /$1/$2/;
    }

    location ~ ^/([a-z0-9][a-z0-9_-]*)$ {
      return 308 /$1/;
    }

    location ~ ^/([a-z0-9][a-z0-9_-]*)/([a-f0-9]{12})/$ {
      root ${ZIPSHIP_SITES_ROOT};
      try_files /$1/releases/$2/index.html =404;
      add_header Cache-Control "no-cache";
    }

    location ~ ^/([a-z0-9][a-z0-9_-]*)/([a-f0-9]{12})/(.+)$ {
      set $zipship_slug $1;
      set $zipship_release_hash $2;
      root ${ZIPSHIP_SITES_ROOT};
      try_files /$1/releases/$2/$3 @zipship_release_spa;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~ ^/([a-z0-9][a-z0-9_-]*)/$ {
      root ${ZIPSHIP_SITES_ROOT};
      try_files /$1/current/index.html =404;
      add_header Cache-Control "no-cache";
    }

    location ~ ^/([a-z0-9][a-z0-9_-]*)/(.+)$ {
      set $zipship_slug $1;
      root ${ZIPSHIP_SITES_ROOT};
      try_files /$1/current/$2 @zipship_current_spa;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location @zipship_release_spa {
      root ${ZIPSHIP_SITES_ROOT};
      try_files /$zipship_slug/releases/$zipship_release_hash/index.html =404;
      add_header Cache-Control "no-cache";
    }

    location @zipship_current_spa {
      root ${ZIPSHIP_SITES_ROOT};
      try_files /$zipship_slug/current/index.html =404;
      add_header Cache-Control "no-cache";
    }
  }
}
